<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photos on the Charles</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>
  <nav class="site-nav"><a href="about.html">About</a></nav>

  <header>
    <h1 id="title">Photos on the Charles</h1>
    <p id="subtitle"></p>
  </header>

  <section class="carousel" aria-label="Photo slideshow">
    <div class="stage" id="stage"></div>

    <div class="controls">
      <button class="ctrl" id="prev" type="button" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 5l-7 7 7 7"/></svg>
      </button>
      <button class="ctrl" id="playpause" type="button" aria-label="Pause slideshow">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="7.5" y="5.5" width="3.5" height="13" rx="1"/><rect x="13" y="5.5" width="3.5" height="13" rx="1"/></svg>
      </button>
      <button class="ctrl" id="next" type="button" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>

    <div class="caption" id="caption"></div>
    <div class="counter" id="counter"></div>
  </section>

  <div class="divider">— ALL —</div>

  <section class="grid" id="grid" aria-label="All photos"></section>

  <footer></footer>
</body>
</html>
